name: Gerenciar Fotos da Galeria

on:
  push:
    paths:
      - 'images/galeria/**'

jobs:
  manage-photos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gerenciar limite de fotos
        run: |
          MAX_PHOTOS=15
          GALLERY_DIR="images/galeria"

          CURRENT_COUNT=$(find "$GALLERY_DIR" -maxdepth 1 -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.webp" \) 2>/dev/null | wc -l)
          echo "Fotos atuais: $CURRENT_COUNT / Máximo: $MAX_PHOTOS"

          if [ "$CURRENT_COUNT" -le "$MAX_PHOTOS" ]; then
            echo "Dentro do limite. Nenhuma foto deletada."
            exit 0
          fi

          TO_DELETE=$((CURRENT_COUNT - MAX_PHOTOS))
          echo "Deletando $TO_DELETE foto(s) mais antiga(s)..."

          OLDEST=$(git log --diff-filter=A --name-only --pretty=format: -- "$GALLERY_DIR" \
            | grep -iE "\.(jpg|jpeg|png|webp)$" \
            | awk '!seen[$0]++' \
            | tail -n "$TO_DELETE")

          DELETED=0
          for FILE in $OLDEST; do
            if [ -f "$FILE" ]; then
              echo "Deletando: $FILE"
              git rm "$FILE"
              DELETED=$((DELETED + 1))
            fi
          done

          if [ "$DELETED" -gt 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Auto: remove $DELETED foto(s) antiga(s) — mantendo limite de $MAX_PHOTOS"
            git push
          else
            echo "Nenhuma foto para deletar."
          fi

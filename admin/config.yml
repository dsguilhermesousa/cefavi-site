backend:
  name: github
  repo: dsguilhermesousa/cefavi-site
  branch: main
  base_url: https://cefavi.com.br
  auth_endpoint: /api/auth

media_folder: "images/galeria"
public_folder: "/images/galeria"

collections:
  - name: "sobre"
    label: "Sobre a Igreja"
    files:
      - label: "Texto Sobre"
        name: "sobre"
        file: "_data/sobre.json"
        fields:
          - { label: "Parágrafo 1", name: "paragrafo1", widget: "text" }
          - { label: "Parágrafo 2", name: "paragrafo2", widget: "text" }
          - { label: "Parágrafo 3", name: "paragrafo3", widget: "text" }
          - { label: "Ano de fundação", name: "fundacao", widget: "string" }

  - name: "cultos"
    label: "Cultos"
    files:
      - label: "Programação de Cultos"
        name: "cultos"
        file: "_data/cultos.json"
        fields:
          - label: "Cultos"
            name: "lista"
            widget: "list"
            fields:
              - { label: "Dia", name: "dia", widget: "string" }
              - { label: "Nome do Culto", name: "nome", widget: "string" }
              - { label: "Horário", name: "hora", widget: "string" }
              - { label: "Observação (opcional)", name: "obs", widget: "string", required: false }

  - name: "versiculos"
    label: "Versículos das Fotos"
    files:
      - label: "Versículos"
        name: "versiculos"
        file: "_data/versiculos.json"
        fields:
          - label: "Versículo 1 (primeira foto)"
            name: "versiculo1"
            widget: "object"
            fields:
              - { label: "Texto do versículo", name: "texto", widget: "text" }
              - { label: "Referência (ex: Salmos 107:1)", name: "referencia", widget: "string" }
          - label: "Versículo 2 (segunda foto)"
            name: "versiculo2"
            widget: "object"
            fields:
              - { label: "Texto do versículo", name: "texto", widget: "text" }
              - { label: "Referência (ex: Mateus 18:20)", name: "referencia", widget: "string" }
